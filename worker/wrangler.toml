name = "docukit-worker"
main = "index.ts"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "VIEW_ONCE_KV"
id = "YOUR_KV_NAMESPACE_ID"          # Replace after `wrangler kv:namespace create view-once`
preview_id = "YOUR_PREVIEW_KV_ID"   # Replace after `wrangler kv:namespace create view-once --preview`

[vars]
ALLOWED_ORIGIN = "https://docukit.uk"

[limits]
# Free tier: 100K req/day
